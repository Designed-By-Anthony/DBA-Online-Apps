name: Deploy Preview Environment

on:
  push:
    branches: [main]

jobs:
  verify:
    name: Verify App Build Matrix
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app:
          - cold-outreach-sequencer
          - lead-form-builder
          - lighthouse-batch-scanner
          - core-web-vitals-monitor
          - local-seo-audit-kit
          - service-area-map-generator
          - calculator
          - store
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: bun install
      - name: Build & lint
        run: bunx turbo run build check-types lint --filter=@dba/${{ matrix.app }}
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}

  deploy-preview:
    name: Deploy Preview
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: bun install

      - name: Deploy API Preview
        working-directory: packages/api
        run: bunx wrangler deploy --env preview
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Build Store
        run: bunx turbo run build --filter=@dba/store
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}

      - name: Deploy Store Preview
        working-directory: apps/store
        run: bunx wrangler deploy --env preview
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
