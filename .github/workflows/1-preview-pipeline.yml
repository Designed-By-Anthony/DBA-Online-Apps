name: "1 · Test → Deploy Preview"

# Fires on every push to main.
# Nothing reaches production from this workflow — production is a separate
# manual dispatch (see 2-production-deploy.yml).
#
# Job order:
#   verify (matrix, parallel)  ──┐
#                                 ├──▶  deploy-preview  ──▶  e2e
#   (no blocking dep on e2e)     ┘     (needs: verify)       (needs: deploy-preview)
#
# The e2e job runs Playwright directly against the live preview domain
# (https://preview.designedbyanthony.online) — no local dev servers.

on:
  push:
    branches: [main]

jobs:
  # ── 1. Build + type-check + lint all apps in parallel ─────────────────────
  verify:
    name: "Verify · ${{ matrix.app }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app:
          - cold-outreach-sequencer
          - lead-form-builder
          - lighthouse-batch-scanner
          - core-web-vitals-monitor
          - local-seo-audit-kit
          - service-area-map-generator
          - calculator
          - store
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: bun install

      - name: Build · type-check · lint
        run: bunx turbo run build check-types lint --filter=@dba/${{ matrix.app }}
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          # Point apps at the preview API during build-time env resolution
          NEXT_PUBLIC_API_URL: https://preview.api.designedbyanthony.online

  # ── 2. Deploy everything to preview (gated on verify passing) ─────────────
  deploy-preview:
    name: "Deploy → preview.designedbyanthony.online"
    needs: verify
    runs-on: ubuntu-latest
    environment:
      name: preview
      url: https://preview.designedbyanthony.online

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: bun install

      # API must be deployed first so the preview apps can talk to it
      - name: Deploy API preview
        working-directory: packages/api
        run: bunx wrangler deploy --env preview
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # Build env vars — baked into each Next.js static bundle at build time
      # All apps point at the preview API so XHR calls from the browser go to
      # preview.api.designedbyanthony.online, not production.
      - name: Build all apps for preview
        run: |
          bunx turbo run build --filter=@dba/calculator
          bunx turbo run build --filter=@dba/cold-outreach-sequencer
          bunx turbo run build --filter=@dba/core-web-vitals-monitor
          bunx turbo run build --filter=@dba/lead-form-builder
          bunx turbo run build --filter=@dba/lighthouse-batch-scanner
          bunx turbo run build --filter=@dba/local-seo-audit-kit
          bunx turbo run build --filter=@dba/service-area-map-generator
          bunx turbo run build --filter=@dba/store
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_API_URL: https://preview.api.designedbyanthony.online

      - name: Deploy calculator preview
        working-directory: apps/calculator
        run: bunx wrangler deploy --env preview
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy cold-outreach-sequencer preview
        working-directory: apps/cold-outreach-sequencer
        run: bunx wrangler deploy --env preview
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy core-web-vitals-monitor preview
        working-directory: apps/core-web-vitals-monitor
        run: bunx wrangler deploy --env preview
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy lead-form-builder preview
        working-directory: apps/lead-form-builder
        run: bunx wrangler deploy --env preview
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy lighthouse-batch-scanner preview
        working-directory: apps/lighthouse-batch-scanner
        run: bunx wrangler deploy --env preview
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy local-seo-audit-kit preview
        working-directory: apps/local-seo-audit-kit
        run: bunx wrangler deploy --env preview
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy service-area-map-generator preview
        working-directory: apps/service-area-map-generator
        run: bunx wrangler deploy --env preview
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy store preview
        working-directory: apps/store
        run: bunx wrangler deploy --env preview
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  # ── 3. E2E against the live preview domain (gated on deploy-preview) ───────
  e2e:
    name: "E2E · preview.designedbyanthony.online"
    needs: deploy-preview
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: bun install

      - name: Install Playwright Chromium
        run: bunx playwright install --with-deps chromium

      - name: Run Playwright E2E tests against preview
        run: bunx playwright test
        env:
          CI: true
          # All test files read these env vars — they now point at the live
          # preview domain instead of localhost.
          BASE_URL: https://preview.designedbyanthony.online
          STORE_BASE_URL: https://preview.designedbyanthony.online
          API_BASE_URL: https://preview.api.designedbyanthony.online
          SCANNER_BASE_URL: https://preview.lighthouse.designedbyanthony.online
          LEAD_FORM_BASE_URL: https://preview.lead-form.designedbyanthony.online
          # Optional: supply a Clerk testing token for authenticated flows.
          # Without it, global.setup.ts writes an empty storageState and the
          # window.Clerk addInitScript mock in each test takes over.
          CLERK_TEST_USER_TOKEN: ${{ secrets.CLERK_TEST_USER_TOKEN }}
          CLERK_ADMIN_ID: ${{ secrets.CLERK_ADMIN_ID }}

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_id }}
          path: playwright-report/
          retention-days: 14

      - name: Upload Playwright traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces-${{ github.run_id }}
          path: test-results/
          retention-days: 7
