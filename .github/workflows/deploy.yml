name: Deploy to Cloudflare

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  deploy-api:
    runs-on: ubuntu-latest
    name: Deploy API Worker
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - run: bun install
      - name: Deploy API
        working-directory: packages/api
        run: bun run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

  verify-apps:
    runs-on: ubuntu-latest
    name: Verify App Build Matrix
    strategy:
      matrix:
        app:
          - cold-outreach-sequencer
          - lead-form-builder
          - lighthouse-batch-scanner
          - core-web-vitals-monitor
          - local-seo-audit-kit
          - service-area-map-generator
          - calculator
          - store
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - run: bun install
      - name: Verify app package
        run: bunx turbo run build check-types lint --filter=@dba/${{ matrix.app }}
