# DEPRECATED — replaced by 1-preview-pipeline.yml and 2-production-deploy.yml
# This file is intentionally inert (workflow_dispatch with no steps).
name: "[DEPRECATED] Deploy to Cloudflare"
on:
  workflow_dispatch:
jobs:
  noop:
    name: "Deprecated — see 1-preview-pipeline.yml and 2-production-deploy.yml"
    runs-on: ubuntu-latest
    steps:
      - run: echo "This workflow has been replaced. Production deploys are now manual via 2-production-deploy.yml."


jobs:
  deploy-api:
    runs-on: ubuntu-latest
    name: Deploy API Worker
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: bun install
      - name: Deploy API
        working-directory: packages/api
        run: bun run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy-store:
    runs-on: ubuntu-latest
    name: Deploy Store Worker
    needs: verify-apps
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: bun install
      - name: Build Store
        run: bunx turbo run build --filter=@dba/store
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
      - name: Deploy Store to Cloudflare Workers
        working-directory: apps/store
        run: bunx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  verify-apps:
    runs-on: ubuntu-latest
    name: Verify App Build Matrix
    strategy:
      matrix:
        app:
          - cold-outreach-sequencer
          - lead-form-builder
          - lighthouse-batch-scanner
          - core-web-vitals-monitor
          - local-seo-audit-kit
          - service-area-map-generator
          - calculator
          - store
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: bun install
      - name: Verify app package
        run: bunx turbo run build check-types lint --filter=@dba/${{ matrix.app }}
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
      - name: Deploy to Cloudflare Workers
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && matrix.app != 'store'
        working-directory: apps/${{ matrix.app }}
        run: bunx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
